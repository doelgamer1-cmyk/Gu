<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Surprise For You ♡</title>
  
  <!-- Beautiful Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Alpine.js CDN for reactivity -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'ui-serif', 'Georgia', 'serif'],
            handwritten: ['"Great Vibes"', 'cursive'],
          },
          animation: {
            'spin-slow': 'spin 12s linear infinite',
            'bounce-slow': 'bounce 3s infinite',
          }
        }
      }
    }
  </script>

  <style>
    /* Premium custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #e5e5e5;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #ccc;
    }

    [x-cloak] { display: none !important; }

    /* Fine noise texture background */
    .noise-bg {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.015'/%3E%3C/svg%3E");
    }

    /* Flip transition classes */
    .flip-card {
      perspective: 1000px;
    }
    .flip-card-inner {
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-card-front, .flip-card-back {
      backface-visibility: hidden;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .flip-card-back {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body 
  class="h-full noise-bg transition-colors duration-1000 select-none overflow-x-hidden"
  :style="'background-color: ' + currentTheme().bg"
  x-data="giftStore()"
  x-init="initApp()"
>

  <!-- 1. FLOATING AUDIO PLAYER (Sticky Left / Bottom) -->
  <div class="fixed bottom-6 left-6 z-50 pointer-events-auto" x-show="musicTrack !== 'silent'">
    <div class="bg-white/90 backdrop-blur-md px-4 py-3 border border-neutral-200/60 shadow-[0_4px_24px_rgba(0,0,0,0.04)] flex items-center gap-4 transition-all hover:shadow-[0_8px_32px_rgba(0,0,0,0.06)]">
      
      <!-- Record player styling -->
      <div class="relative w-12 h-12 flex-shrink-0">
        <div 
          class="w-full h-full rounded-full bg-neutral-900 flex items-center justify-center relative shadow-md transition-transform duration-1000"
          :class="isPlaying ? 'animate-spin-slow' : ''"
        >
          <div class="w-4 h-4 rounded-full bg-pink-100 border-2 border-neutral-950 flex items-center justify-center">
            <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
          </div>
        </div>
        <!-- Stylus Arm -->
        <div 
          class="absolute -top-1 -right-1 w-5 h-7 border-t-2 border-r-2 border-pink-400 rounded-tr-md origin-top-left transition-transform duration-500 pointer-events-none"
          :style="isPlaying ? 'transform: rotate(15deg);' : 'transform: rotate(-10deg);'"
        ></div>
      </div>

      <!-- Controls -->
      <div class="flex flex-col">
        <span class="text-[9px] uppercase tracking-wider text-neutral-400 font-bold">Soundtrack</span>
        <button 
          @click="togglePlay()" 
          class="text-xs font-semibold hover:text-pink-600 transition-colors flex items-center gap-1 text-left mt-0.5"
        >
          <span x-text="isPlaying ? '🔊 Playing...' : '🔇 Silent' "></span>
          <span class="text-neutral-500" x-text="getTrackTitle()"></span>
        </button>
      </div>

      <!-- Wave visualizer -->
      <div class="flex items-center gap-0.5 h-3 pl-2 border-l border-neutral-100">
        <div class="w-0.5 bg-pink-500 rounded-full transition-all duration-300" :style="isPlaying ? 'height: ' + (Math.random()*8 + 4) + 'px;' : 'height: 2px;'"></div>
        <div class="w-0.5 bg-pink-500 rounded-full transition-all duration-300" :style="isPlaying ? 'height: ' + (Math.random()*8 + 4) + 'px;' : 'height: 2px;'"></div>
        <div class="w-0.5 bg-pink-500 rounded-full transition-all duration-300" :style="isPlaying ? 'height: ' + (Math.random()*8 + 4) + 'px;' : 'height: 2px;'"></div>
      </div>
    </div>
  </div>

  <!-- 2. CUSTOMIZER TRIGGER BUTTON -->
  <button 
    @click="isCustomizerOpen = true"
    class="fixed top-6 right-6 z-40 bg-white/95 hover:bg-neutral-950 hover:text-white border border-neutral-900 px-4 py-2.5 text-[10px] uppercase tracking-[0.2em] font-extrabold transition-all active:scale-95 shadow-sm"
  >
    Customize Surprise
  </button>

  <!-- 3. MAIN INTERACTIVE SURPRISE CONTAINER -->
  <div class="min-h-screen flex flex-col justify-between py-12 px-4 relative z-10">
    <div class="flex-1 flex flex-col justify-center items-center">
      
      <!-- STAGE A: CLOSED ENVELOPE -->
      <template x-if="activeScene === 'envelope'">
        <div class="w-full max-w-lg text-center" x-transition>
          <div class="mb-4">
            <span class="font-handwritten text-4xl text-neutral-500" x-text="'Dear ' + recipientName + ','"></span>
          </div>
          
          <!-- Envelope Cover Box -->
          <div 
            @click="openEnvelope()"
            class="group relative bg-[#FCFAF6] border-2 border-[#1A1A1A] w-full aspect-[4/3] shadow-[0_12px_45px_rgba(0,0,0,0.06)] cursor-pointer overflow-hidden transform hover:-translate-y-2 transition-all duration-500 flex flex-col justify-between p-8"
          >
            <!-- Border inner -->
            <div class="absolute inset-4 border border-neutral-300/40 pointer-events-none"></div>
            
            <div class="flex justify-between items-start">
              <span class="text-[10px] font-mono tracking-widest text-neutral-400">CLASSIC POST // 2026</span>
              <div class="w-8 h-10 border border-neutral-300 bg-neutral-100 flex items-center justify-center text-xs text-neutral-400 rotate-3">❦</div>
            </div>

            <!-- Wax seal aesthetic stamp -->
            <div class="my-auto self-center flex flex-col items-center gap-3">
              <div class="w-16 h-16 rounded-full bg-red-100 border border-red-200 flex items-center justify-center shadow-inner group-hover:scale-110 transition-transform duration-500">
                <i data-lucide="heart" class="w-8 h-8 text-red-500 fill-red-400 animate-pulse"></i>
              </div>
              <span class="text-[10px] font-extrabold uppercase tracking-[0.25em] text-neutral-500 group-hover:text-neutral-900 transition-colors">
                Click Wax Seal to Open
              </span>
            </div>

            <div class="flex justify-between items-end">
              <span class="font-handwritten text-2xl text-neutral-400" x-text="'from ' + senderName"></span>
              <span class="text-[10px] font-mono tracking-widest text-neutral-400">JUNE 19, 2026</span>
            </div>
          </div>
        </div>
      </template>

      <!-- STAGE B: GREETING SURPRISE CARD -->
      <template x-if="activeScene === 'card'">
        <div class="w-full max-w-lg aspect-[3/4.2] sm:aspect-[3/4] flex flex-col items-center justify-center" x-transition>
          <div class="flip-card w-full h-full max-w-[420px]" :class="isFlipped ? 'flipped' : ''">
            <div class="flip-card-inner w-full h-full relative">
              
              <!-- CARD COVERS (FRONT) -->
              <div class="flip-card-front bg-[#FCFAF6] border-2 border-neutral-950 p-6 sm:p-10 flex flex-col justify-between shadow-xl">
                <!-- Inner margin margin boundary -->
                <div class="absolute inset-4 border border-neutral-200/50 pointer-events-none"></div>
                
                <div class="flex flex-col items-center text-center mt-6">
                  <div class="flex items-center gap-2 mb-4">
                    <span class="text-neutral-300 font-serif italic text-sm">❦</span>
                    <span class="text-[9px] uppercase font-extrabold tracking-[0.25em] text-neutral-400" x-text="badgeText"></span>
                    <span class="text-neutral-300 font-serif italic text-sm">❦</span>
                  </div>

                  <h1 class="font-serif text-4xl sm:text-5xl text-neutral-950 font-normal leading-[1.05] tracking-tight text-center my-6" x-text="mainHeading"></h1>
                </div>

                <!-- Floating Micro-Hearts Interactive Heart Area -->
                <div class="flex flex-col items-center gap-3 my-auto">
                  <button 
                    @click="addHeart($event)"
                    class="w-14 h-14 rounded-full bg-[#FAF5EB] hover:bg-neutral-900 hover:text-[#FCFAF6] border border-neutral-900 flex items-center justify-center transition-all hover:scale-105 active:scale-95 shadow-sm"
                  >
                    <i data-lucide="heart" class="w-6 h-6 text-red-500 fill-red-400"></i>
                  </button>
                  <span class="text-[9px] font-mono tracking-widest text-neutral-400" x-text="heartCount + ' HEARTS SENT'"></span>
                </div>

                <!-- Footer Navigation -->
                <div class="flex flex-col gap-3 items-center z-20">
                  <button 
                    @click="openLetter()"
                    class="w-full py-3 bg-neutral-950 hover:bg-neutral-850 text-[#FCFAF6] hover:text-white text-[11px] font-extrabold uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-1.5"
                  >
                    <span>Read Letter</span>
                    <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                  </button>
                  
                  <button 
                    @click="activeScene = 'album'"
                    class="py-1 text-[10px] uppercase font-extrabold tracking-widest text-pink-500 hover:text-pink-600 transition-colors"
                  >
                    Our Album Gallery 🎞️
                  </button>
                </div>
              </div>

              <!-- CARD WRITING (BACK) -->
              <div class="flip-card-back bg-[#FCFAF6] border-2 border-neutral-950 p-6 sm:p-10 flex flex-col justify-between shadow-xl">
                <div class="absolute inset-4 border border-neutral-200/50 pointer-events-none"></div>

                <div class="mt-4">
                  <div class="font-handwritten text-2xl text-neutral-400 mb-2">especially for you...</div>
                  <h2 class="font-serif text-3xl font-normal text-neutral-950 leading-tight">A Letter of Warm Wishes</h2>
                </div>

                <!-- Letter Body Scrollable text -->
                <div class="my-6 flex-1 overflow-y-auto max-h-[180px] sm:max-h-[220px] pr-2 text-left font-serif text-sm text-neutral-700/90 leading-relaxed italic border-t border-b border-dashed border-neutral-200/80 py-4">
                  <p class="whitespace-pre-line" x-text="letterBody"></p>
                </div>

                <!-- Sender Sign-off footer inside card back -->
                <div class="flex flex-col gap-3">
                  <div class="flex justify-between items-end border-b border-neutral-200 pb-2 mb-2">
                    <span class="text-[10px] font-mono tracking-widest text-neutral-400">WARMEST REGARDS,</span>
                    <span class="font-handwritten text-2xl text-neutral-900" x-text="senderName"></span>
                  </div>

                  <div class="flex justify-between items-center gap-3">
                    <button 
                      @click="isFlipped = false"
                      class="px-4 py-2 border border-neutral-300 hover:bg-neutral-50 text-[10px] font-bold uppercase tracking-widest transition-colors flex items-center gap-1"
                    >
                      <i data-lucide="arrow-left" class="w-3 h-3"></i>
                      <span>Cover</span>
                    </button>
                    
                    <button 
                      @click="activeScene = 'album'"
                      class="flex-1 py-2 bg-pink-500 hover:bg-pink-600 text-white text-[10px] font-bold uppercase tracking-[0.15em] transition-colors text-center"
                    >
                      View Album Gallery
                    </button>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </template>

      <!-- STAGE C: ALBUM GALLERY -->
      <template x-if="activeScene === 'album'">
        <div class="w-full max-w-4xl mx-auto px-4" x-transition>
          
          <!-- Navigation header layout row -->
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-10 pb-6 border-b border-neutral-950/20">
            <button 
              @click="activeScene = 'card'"
              class="px-4 py-2 bg-[#FCFAF6]/90 border border-neutral-900 text-[10px] font-extrabold uppercase tracking-[0.2em] hover:bg-neutral-900 hover:text-white transition-all flex items-center gap-1.5"
            >
              <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
              <span>Back To Card</span>
            </button>
            <span class="font-handwritten text-xl text-neutral-400 select-none">
              shared with love ♡
            </span>
          </div>

          <!-- Titles layout -->
          <div class="text-left mb-12 max-w-2xl">
            <h2 class="font-serif text-4xl sm:text-5xl text-neutral-950 leading-tight mb-3">Our Saved Memories</h2>
            <p class="font-serif text-neutral-600 italic text-sm sm:text-base leading-relaxed">
              A cute little garden of moments, laughs, and adventures spent together.
            </p>
          </div>

          <!-- Polaroid bento list grid layout -->
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 sm:gap-8 pb-12">
            
            <template x-for="(item, index) in pData" :key="index">
              <div class="bg-[#FCFAF6] border border-neutral-400/30 p-4 shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative group flex flex-col">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-20 h-5.5 bg-[#FAF4E8]/90 border border-dashed border-neutral-400/20 rotate-1"></div>
                <div class="w-full aspect-square overflow-hidden bg-neutral-100 border border-neutral-200">
                  <img :src="item.url" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" :alt="item.caption">
                </div>
                <div class="pt-4 pb-2 flex-grow flex flex-col justify-between">
                  <p class="font-sans text-xs text-neutral-800 font-medium leading-relaxed" x-text="item.caption"></p>
                  <div class="flex justify-between items-center text-[9px] font-mono text-neutral-400 mt-3 border-t border-neutral-100 pt-2">
                    <span x-text="item.date"></span>
                    <span x-text="'SNAP_0' + (index+1) + ' 🎞️'"></span>
                  </div>
                </div>
              </div>
            </template>

          </div>
        </div>
      </template>

    </div>

    <!-- HEART FLOATING PARTICLES EFFECT CONTAINER -->
    <div id="heart-spawner-container" class="fixed inset-0 pointer-events-none z-50"></div>

    <!-- ROOT DESIGNER FOOTER -->
    <footer class="text-center text-[9px] font-mono tracking-widest text-[#1a1a1a]/30">
      CRAFTED AND PERSONALIZED ESPECIALLY FOR YOU WITH LOVE ♡ 2026
    </footer>
  </div>

  <!-- 4. CUSTOMIZER SIDEBAR SLIDEOVER PANEL -->
  <div 
    class="fixed inset-x-0 bottom-0 top-0 z-50 flex justify-end" 
    x-show="isCustomizerOpen" 
    x-cloak
  >
    <!-- Overlay backdrop -->
    <div 
      @click="isCustomizerOpen = false"
      class="absolute inset-0 bg-neutral-900/45 backdrop-blur-xs transition-opacity duration-500"
    ></div>

    <!-- Card Customize Panels sliding drawer -->
    <div 
      class="relative w-full max-w-md h-full bg-[#FCFAF6] border-l border-neutral-900 shadow-2xl overflow-y-auto flex flex-col p-6 text-left"
      x-transition:enter="transform transition-transform ease-out duration-300"
      x-transition:enter-start="translate-x-full"
      x-transition:enter-end="translate-x-0"
      x-transition:leave="transform transition-transform ease-in duration-200"
      x-transition:leave-start="translate-x-0"
      x-transition:leave-end="translate-x-full"
    >
      <div class="flex justify-between items-center pb-4 border-b border-neutral-200 mb-6">
        <h3 class="font-serif text-lg font-bold">Customize Surprises</h3>
        <button 
          @click="isCustomizerOpen = false"
          class="p-1 hover:bg-neutral-100 text-neutral-400 hover:text-neutral-950 transition-colors"
        >
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Settings List -->
      <div class="space-y-5 flex-1 pr-1 font-sans text-xs">
        
        <!-- Recipient & Sender -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Recipient To</label>
            <input type="text" x-model="recipientName" class="w-full border border-neutral-300 px-3 py-2 text-sm bg-white focus:outline-none focus:border-black font-semibold">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Sender From</label>
            <input type="text" x-model="senderName" class="w-full border border-neutral-300 px-3 py-2 text-sm bg-white focus:outline-none focus:border-black font-semibold">
          </div>
        </div>

        <!-- Custom Card badge link cover text -->
        <div>
          <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Cover Badge Text</label>
          <input type="text" x-model="badgeText" class="w-full border border-neutral-300 px-3 py-2 text-sm bg-white focus:outline-none focus:border-black">
        </div>

        <!-- Heading message title text -->
        <div>
          <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Cover Display Title</label>
          <input type="text" x-model="mainHeading" class="w-full border border-neutral-300 px-3 py-2 text-sm bg-white focus:outline-none focus:border-black">
        </div>

        <!-- Custom Personal Letter -->
        <div>
          <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Personal Letter Body</label>
          <textarea x-model="letterBody" rows="5" class="w-full border border-neutral-300 px-3 py-2 text-sm bg-white focus:outline-none focus:border-black leading-relaxed font-serif"></textarea>
        </div>

        <!-- Soundtrack options -->
        <div>
          <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Background Melody Synth</label>
          <select 
            x-model="musicTrack" 
            @change="changeTrack($el.value)"
            class="w-full border border-neutral-300 px-3 py-2 text-sm bg-white focus:outline-none focus:border-black font-semibold"
          >
            <option value="happy_birthday">Happy Birthday (Music Box)</option>
            <option value="sweet_piano">Sweet Lullaby (Soft Bells)</option>
            <option value="lofi_lullaby">Lofi Dreamland (Chiptune)</option>
            <option value="silent">Silent Mode (No Audio)</option>
          </select>
        </div>

        <!-- Themes visual pickers -->
        <div>
          <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-2">Visual Palette Color Theme</label>
          <div class="grid grid-cols-4 gap-2">
            <template x-for="(theme, key) in themes" :key="key">
              <button 
                @click="themeColor = key"
                class="border p-2 text-center text-[10px] font-medium tracking-tight uppercase flex flex-col items-center gap-1.5"
                :class="themeColor === key ? 'border-neutral-900 bg-neutral-100 shadow-inner font-extrabold' : 'border-neutral-300 hover:border-neutral-500 bg-white'"
              >
                <div class="w-4 h-4 rounded-full border border-neutral-200" :style="'background-color: ' + theme.color"></div>
                <span x-text="key"></span>
              </button>
            </template>
          </div>
        </div>

      </div>

      <button 
        @click="isCustomizerOpen = false"
        class="mt-8 w-full py-3 bg-neutral-950 text-white font-extrabold uppercase tracking-widest text-[11px] hover:bg-neutral-900 transition-colors focus:outline-none"
      >
        Apply Customizations
      </button>
    </div>
  </div>

  <!-- MAIN SCRIPTS BLOCK & WEB AUDIO GENERATORS -->
  <script>
    const NOTE_FREQS = {
      'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
      'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25, 'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99, 'G#5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'B5': 987.77,
      'C6': 1046.50
    };

    const MELODIES = {
      happy_birthday: [
        { note: 'G4', dur: 0.5 }, { note: 'G4', dur: 0.5 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'C5', dur: 1 }, { note: 'B4', dur: 2 },
        { note: 'G4', dur: 0.5 }, { note: 'G4', dur: 0.5 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'D5', dur: 1 }, { note: 'C5', dur: 2 },
        { note: 'G4', dur: 0.5 }, { note: 'G4', dur: 0.5 }, { note: 'G5', dur: 1 }, { note: 'E5', dur: 1 }, { note: 'C5', dur: 1 }, { note: 'B4', dur: 1 }, { note: 'A4', dur: 2 },
        { note: 'F5', dur: 0.5 }, { note: 'F5', dur: 0.5 }, { note: 'E5', dur: 1 }, { note: 'C5', dur: 1 }, { note: 'D5', dur: 1 }, { note: 'C5', dur: 3 }
      ],
      sweet_piano: [
        { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'C5', dur: 1 },
        { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 }, { note: 'E5', dur: 1 }, { note: 'C5', dur: 1 },
        { note: 'F4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 }, { note: 'A4', dur: 1 },
        { note: 'G4', dur: 1 }, { note: 'B4', dur: 1 }, { note: 'D5', dur: 1 }, { note: 'G4', dur: 1 }
      ],
      lofi_lullaby: [
        { note: 'E4', dur: 1.5 }, { note: 'G4', dur: 0.5 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
        { note: 'D5', dur: 0.5 }, { note: 'C5', dur: 0.5 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 2 },
        { note: 'E5', dur: 1.5 }, { note: 'D5', dur: 0.5 }, { note: 'C5', dur: 1 }, { note: 'A4', dur: 1 }
      ]
    };

    let audioCtx = null;
    let mainGain = null;
    let schedulerTimerId = null;
    let isPlayingAudioState = false;
    let nextNoteIndex = 0;
    let currentOscs = [];

    function stopMelody() {
      isPlayingAudioState = false;
      if (schedulerTimerId) {
        clearTimeout(schedulerTimerId);
        schedulerTimerId = null;
      }
      currentOscs.forEach(o => {
        try { o.stop(); } catch(e) {}
      });
      currentOscs = [];
      if (mainGain && audioCtx) {
        try {
          mainGain.gain.setValueAtTime(0, audioCtx.currentTime);
        } catch(e) {}
      }
    }

    function startMelody(trackName) {
      if (trackName === 'silent') return;
      
      if (!audioCtx) {
        const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioCtxClass();
      }

      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      stopMelody();
      isPlayingAudioState = true;
      nextNoteIndex = 0;

      const delay = audioCtx.createDelay(1.0);
      const delayFeedback = audioCtx.createGain();
      mainGain = audioCtx.createGain();

      mainGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
      delay.delayTime.setValueAtTime(0.35, audioCtx.currentTime);
      delayFeedback.gain.setValueAtTime(0.25, audioCtx.currentTime);

      mainGain.connect(audioCtx.destination);
      mainGain.connect(delay);
      delay.connect(delayFeedback);
      delayFeedback.connect(delay);
      delay.connect(audioCtx.destination);

      const melody = MELODIES[trackName] || [];
      const bpm = trackName === 'happy_birthday' ? 105 : 95;
      const beatDuration = 60 / bpm;

      function playNote() {
        if (!isPlayingAudioState || melody.length === 0) return;

        const noteItem = melody[nextNoteIndex];
        const freq = NOTE_FREQS[noteItem.note] || 440;
        const noteDuration = noteItem.dur * beatDuration;

        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const noteGain = audioCtx.createGain();

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(freq, audioCtx.currentTime);

        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(freq * 2, audioCtx.currentTime);

        noteGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        noteGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
        noteGain.gain.exponentialRampToValueAtTime(0.04, audioCtx.currentTime + noteDuration * 0.4);
        noteGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + noteDuration);

        osc1.connect(noteGain);
        osc2.connect(noteGain);
        noteGain.connect(mainGain);

        osc1.start(audioCtx.currentTime);
        osc2.start(audioCtx.currentTime);
        osc1.stop(audioCtx.currentTime + noteDuration);
        osc2.stop(audioCtx.currentTime + noteDuration);

        currentOscs.push(osc1, osc2);

        nextNoteIndex = (nextNoteIndex + 1) % melody.length;
        schedulerTimerId = setTimeout(playNote, noteDuration * 1000);
      }

      playNote();
    }

        initApp() {

        togglePlay() {
          this.isPlaying = !this.isPlaying;
          if (this.isPlaying) {
            startMelody(this.musicTrack);

        changeTrack(value) {
          this.musicTrack = value;
          if (this.isPlaying) {

        getTrackTitle() {
          if (this.musicTrack === 'silent') return 'Silent';
          if (this.musicTrack === 'sweet_piano') return 'Soft Bells';
          if (this.musicTrack === 'lofi_lullaby') return 'Chiptune Lullaby';
          return 'Music Box';
        },

        addHeart(event) {
          this.heartCount++;
          const container = document.getElementById('heart-spawner-container');
          if (!container) return;

          const rect = event ? event.target.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 40, height: 40 };
          const startX = event ? (event.clientX || rect.left + rect.width / 2) : window.innerWidth / 2;
          const startY = event ? (event.clientY || rect.top) : window.innerHeight / 2;

          for (let i = 0; i < 6; i++) {
            const el = document.createElement('div');
            el.innerHTML = '❤️';
            el.style.position = 'fixed';
            el.style.left = startX + 'px';
            el.style.top = startY + 'px';

            el.style.transition = 'all 1.5s cubic-bezier(0.1, 0.8, 0.3, 1)';
            el.style.pointerEvents = 'none';
            el.style.transform = 'translate(-50%, -50%)';
            el.style.opacity = '1';
            container.appendChild(el);

            const dx = (Math.random() - 0.5) * 200;
            const dy = -Math.floor(Math.random() * 150 + 100);

            setTimeout(() => {
              el.style.left = (startX + dx) + 'px';
              el.style.top = (startY + dy) + 'px';
              el.style.opacity = '0';
              el.style.transform = 'translate(-50%, -50%) rotate(' + (Math.random() * 60 - 30) + 'deg) scale(0.6)';
            }, 10);

            setTimeout(() => {
              el.remove();
            }, 1500);
          }
        }
      };
    }
